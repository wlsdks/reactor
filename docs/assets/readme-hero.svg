<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Reactor — governed AI agent infrastructure</title>
  <desc id="desc">A dark system diagram showing policy, context, tools, memory, durable state, and evidence coordinated by Reactor.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B0D11"/>
      <stop offset="0.55" stop-color="#11151B"/>
      <stop offset="1" stop-color="#191B20"/>
    </linearGradient>
    <radialGradient id="reactor-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#E9B65B" stop-opacity="0.24"/>
      <stop offset="0.52" stop-color="#E9B65B" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#E9B65B" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#FFFFFF" stroke-opacity="0.035"/>
    </pattern>
    <filter id="soft-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .sans { font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
      .eyebrow { fill: #E9B65B; font-size: 13px; font-weight: 700; letter-spacing: 3px; }
      .headline { fill: #F4F1E8; font-size: 52px; font-weight: 680; letter-spacing: -1.8px; }
      .body { fill: #9EA5B0; font-size: 18px; font-weight: 430; }
      .node-title { fill: #F4F1E8; font-size: 13px; font-weight: 650; letter-spacing: 0.4px; }
      .node-meta { fill: #7F8792; font-size: 10px; letter-spacing: 1.2px; }
      .stack { fill: #737B86; font-size: 11px; font-weight: 650; letter-spacing: 1.6px; }
    </style>
  </defs>

  <rect width="1200" height="520" rx="24" fill="url(#background)"/>
  <rect width="1200" height="520" rx="24" fill="url(#grid)"/>
  <path d="M0 446H1200" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <path d="M72 80H1128" stroke="#FFFFFF" stroke-opacity="0.06"/>

  <g class="sans">
    <text x="72" y="126" class="eyebrow">REACTOR / CONTROL PLANE</text>
    <text x="72" y="198" class="headline">Control the run.</text>
    <text x="72" y="258" class="headline">Prove the outcome.</text>
    <text x="72" y="309" class="body">Durable AI agents, governed through one</text>
    <text x="72" y="337" class="body">policy boundary and observable by design.</text>

    <g transform="translate(72 375)">
      <circle cx="6" cy="6" r="6" fill="#65C18C"/>
      <text x="24" y="11" class="mono" fill="#B8BEC7" font-size="12">GUARDED</text>
      <circle cx="122" cy="6" r="6" fill="#E9B65B"/>
      <text x="140" y="11" class="mono" fill="#B8BEC7" font-size="12">DURABLE</text>
      <circle cx="250" cy="6" r="6" fill="#77A7E8"/>
      <text x="268" y="11" class="mono" fill="#B8BEC7" font-size="12">TRACEABLE</text>
    </g>
  </g>

  <g transform="translate(835 252)">
    <circle r="190" fill="url(#reactor-glow)"/>
    <circle r="91" fill="none" stroke="#E9B65B" stroke-opacity="0.18" stroke-width="1.5" stroke-dasharray="4 8"/>
    <circle r="66" fill="#12151A" stroke="#E9B65B" stroke-width="2"/>
    <circle r="47" fill="#171A20" stroke="#E9B65B" stroke-opacity="0.5"/>
    <path d="M-20-24V5M0-35V0M20-24V5" fill="none" stroke="#E9B65B" stroke-width="7" stroke-linecap="round"/>
    <path d="M-29 8C-27 31-14 42 0 46 14 42 27 31 29 8" fill="none" stroke="#E9B65B" stroke-width="5" stroke-linecap="round"/>
    <text y="86" text-anchor="middle" class="sans eyebrow" font-size="11">REACTOR</text>
  </g>

  <g class="sans">
    <path d="M686 144L775 207M984 144L895 207M680 280L765 267M990 280L905 267M708 388L785 307M962 388L885 307" fill="none" stroke="#E9B65B" stroke-opacity="0.28"/>

    <g transform="translate(570 102)">
      <rect width="140" height="58" rx="10" fill="#14181E" stroke="#FFFFFF" stroke-opacity="0.1"/>
      <circle cx="20" cy="20" r="5" fill="#E9B65B"/>
      <text x="34" y="24" class="node-title">POLICY</text>
      <text x="20" y="44" class="node-meta mono">GUARDS · RBAC</text>
    </g>
    <g transform="translate(960 102)">
      <rect width="156" height="58" rx="10" fill="#14181E" stroke="#FFFFFF" stroke-opacity="0.1"/>
      <circle cx="20" cy="20" r="5" fill="#77A7E8"/>
      <text x="34" y="24" class="node-title">CONTEXT</text>
      <text x="20" y="44" class="node-meta mono">RAG · PROMPTS</text>
    </g>
    <g transform="translate(548 251)">
      <rect width="142" height="58" rx="10" fill="#14181E" stroke="#FFFFFF" stroke-opacity="0.1"/>
      <circle cx="20" cy="20" r="5" fill="#65C18C"/>
      <text x="34" y="24" class="node-title">TOOLS</text>
      <text x="20" y="44" class="node-meta mono">MCP · APPROVAL</text>
    </g>
    <g transform="translate(980 251)">
      <rect width="146" height="58" rx="10" fill="#14181E" stroke="#FFFFFF" stroke-opacity="0.1"/>
      <circle cx="20" cy="20" r="5" fill="#B48EDE"/>
      <text x="34" y="24" class="node-title">MEMORY</text>
      <text x="20" y="44" class="node-meta mono">LANGMEM · ACL</text>
    </g>
    <g transform="translate(606 374)">
      <rect width="168" height="58" rx="10" fill="#14181E" stroke="#FFFFFF" stroke-opacity="0.1"/>
      <circle cx="20" cy="20" r="5" fill="#E17878"/>
      <text x="34" y="24" class="node-title">DURABLE STATE</text>
      <text x="20" y="44" class="node-meta mono">POSTGRES · QUEUES</text>
    </g>
    <g transform="translate(908 374)">
      <rect width="158" height="58" rx="10" fill="#14181E" stroke="#FFFFFF" stroke-opacity="0.1"/>
      <circle cx="20" cy="20" r="5" fill="#70C5C0"/>
      <text x="34" y="24" class="node-title">EVIDENCE</text>
      <text x="20" y="44" class="node-meta mono">TRACES · EVALS</text>
    </g>
  </g>

  <g class="sans" transform="translate(72 480)">
    <text class="stack" x="0">FASTAPI</text>
    <text class="stack" x="128">LANGGRAPH</text>
    <text class="stack" x="290">POSTGRESQL</text>
    <text class="stack" x="464">MCP + A2A</text>
    <text class="stack" x="618">LANGSMITH</text>
  </g>
</svg>
